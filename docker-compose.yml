version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://artisan:artisan_pass@db:5432/artisan_db
      - NEXTAUTH_SECRET=change-me-to-a-random-secret-string
      - NEXTAUTH_URL=http://localhost:3000
      - APP_URL=http://localhost:3000
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
      - SMTP_FROM=noreply@artisan-marketplace.local
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/public/uploads
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: artisan_db
      POSTGRES_USER: artisan
      POSTGRES_PASSWORD: artisan_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artisan -d artisan_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Local email testing (optional)
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"  # Web UI
      - "1025:1025"  # SMTP
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
